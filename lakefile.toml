name = "verso-snippets"
version = "0.1.0"
defaultTargets = ["render-snippet"]

[[require]]
name = "verso"
git = "https://github.com/leanprover/verso.git"
rev = "v4.29.0"

# Pinned to the exact revision Verso v4.29.0 depends on, to avoid toolchain drift.
[[require]]
name = "subverso"
git = "https://github.com/leanprover/subverso.git"
rev = "52b9dfbd2658408e37ae6e8b72601ddeaaa25a0c"

# The user's Lean code lives as the `Snippet` module. SubVerso's `:highlighted`
# facet turns it into highlighted JSON without a Verso document.
[[lean_lib]]
name = "Snippet"

# The renderer library (VersoSnippet.Render / .Literate / .Assets / .Page).
[[lean_lib]]
name = "VersoSnippet"
globs = ["VersoSnippet.*"]

# Reads the highlighted JSON and renders a self-contained HTML snippet using
# Verso's own rendering library. Input-independent, so it is built once.
[[lean_exe]]
name = "render-snippet"
root = "Main"
