name = "verso-snippets"
version = "0.1.0"
defaultTargets = ["render-snippet"]

[[require]]
name = "verso"
git = "https://github.com/leanprover/verso.git"
rev = "v4.31.0"

[[require]]
name = "subverso"
git = "https://github.com/leanprover/subverso.git"
rev = "main"

[[lean_lib]]
name = "Snippet"

[[lean_lib]]
name = "VersoSnippet"
globs = ["VersoSnippet.*"]

[[lean_exe]]
name = "render-snippet"
root = "Main"

# Decode a live.lean-lang.org share link (#code= / #codez= / #url=) to Lean source. 
[[lean_exe]]
name = "decode-link"
root = "VersoSnippet.DecodeLink"
